<html>
<head>
    <title>MSX Image Tools v.0.6.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>MSX Image Tools</h1>
    <div class="version">v.0.6.0</div>

    <form>

        <input type="reset" id="btnReset" />

        <div class="flex-container">
            <div class="box">
                <fieldset>
                
                    <legend>Image</legend> 
                    
                    <label for="fileInputImage">File (*.sc5):</label>
                    <input type="file" id="fileInputImage" accept=".sc5" />

                    <br />
                    
                    <canvas id="canvasScreen" width="256" height="256" style="border:1px solid #000000;">
                    </canvas>

                    <br />

                    <button type="button" id="btnSaveFile">Save file</button>

                </fieldset>
            </div>

            <div class="box">
                <fieldset>
                
                    <legend>Palette</legend> 

                    <input type="radio" id="rdoPaletteSource_Image" name="rdoPaletteSource" value="image" checked="true" />
                    <label for="rdoPaletteSource_Image">Palette from image file</label>
                    <input type="radio" id="rdoPaletteSource_Palette" name="rdoPaletteSource" value="palette" />
                    <label for="rdoPaletteSource_Palette">Palette from palette file (*.pal, *.pl5)</label>
                    
                    <input type="file" id="fileInputPalette" accept=".pal,.pl5" hidden="true" />
                
                    <br />

                    <canvas id="canvasPalette" width="512" height="64">
                    </canvas>

                </fieldset>	
            </div>
        </div>

        <fieldset>
        
            <legend>Commands</legend> 

            <select id="comboCommand">
                <option value="0">Replace color</option>
                <option value="1">Convert to sprites</option>
            </select>
            
            <div id="div_Cmd_ReplaceColor" class="divCmd">
                Replace pixels of color 
                <select id="comboColorFrom">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                </select>
                by color
                <select id="comboColorTo">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                </select>
            </div>
            
            <div id="div_Cmd_ConvertToSprites" class="divCmd">
                <label for="combo_ConvertToSprites_TransparentColor">Transparent Color:</label><select id="combo_ConvertToSprites_TransparentColor">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                </select>

                <label for="txt_ConvertToSprites_X">X:</label><input type="number" id="txt_ConvertToSprites_X" value="0" class="inputNumber">
                <label for="txt_ConvertToSprites_Y">Y:</label><input type="number" id="txt_ConvertToSprites_Y" value="0" class="inputNumber">
                <canvas id="canvasSprite" width="64" height="64" style="border:1px solid #000000;"></canvas>
                
                <br />

                <textarea id="outputSprites" style="width: 100%; height: 100px;"></textarea>

            </div>

            <button type="button" id="btnExecuteCommand">Execute</button>

        </fieldset>	

        <br />
        
        <br />

        <textarea id="output" style="width: 100%; height: 350px;"></textarea>

    </form>

    <script type="text/javascript" src="script.js"></script>
    <script type="text/javascript" src="events.js"></script>

</body>

</html>
